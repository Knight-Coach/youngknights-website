<style>
  body { background: hsl(var(--yk-off)); }
  .gs-shell {
    min-height: 100vh;
    display: flex; flex-direction: column;
    background:
      radial-gradient(800px 500px at 85% -10%, hsl(var(--yk-red) / .18), transparent 60%),
      radial-gradient(700px 500px at -10% 100%, hsl(var(--yk-red) / .10), transparent 60%),
      linear-gradient(180deg, hsl(var(--yk-ink)) 0%, hsl(220 40% 8%) 100%);
    color: white;
  }
  .gs-topbar {
    padding: 18px 24px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid hsl(0 0% 100% / .08);
  }
  .gs-topbar a.back {
    color: hsl(0 0% 100% / .7); font-size: 13px; font-weight: 600;
    text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
  }
  .gs-topbar a.back:hover { color: white; }
  .gs-main { flex: 1; display: grid; place-items: center; padding: 48px 24px; }
  .gs-card {
    width: 100%; max-width: 720px;
    background: white; color: hsl(var(--yk-ink));
    border-radius: 24px;
    box-shadow: 0 40px 80px -20px rgba(0,0,0,.5);
    overflow: hidden;
  }
  .gs-progress { display: flex; gap: 4px; padding: 20px 32px 0; }
  .gs-progress span {
    flex: 1; height: 4px; border-radius: 2px;
    background: hsl(var(--yk-line));
    transition: background .3s;
  }
  .gs-progress span.done { background: hsl(var(--yk-red)); }
  .gs-body { padding: 32px 40px 40px; }
  .gs-step-num {
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: hsl(var(--yk-red));
    margin-bottom: 14px; display: flex; gap: 10px; align-items: center;
  }
  .gs-step-num::before {
    content: ""; width: 24px; height: 2px; background: hsl(var(--yk-red));
  }
  .gs-q {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: clamp(26px, 3.5vw, 36px); font-weight: 800;
    letter-spacing: -0.02em; line-height: 1.15;
    margin: 0 0 8px;
  }
  .gs-sub { font-size: 15px; color: hsl(var(--yk-ink) / .65); margin: 0 0 24px; line-height: 1.5; }
  .gs-opts { display: grid; gap: 10px; margin-bottom: 28px; }
  .gs-opt {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 20px;
    border: 2px solid hsl(var(--yk-line));
    border-radius: 14px;
    background: white; cursor: pointer;
    transition: all .15s;
    text-align: left; width: 100%; font: inherit; color: inherit;
  }
  .gs-opt:hover { border-color: hsl(var(--yk-ink) / .4); background: hsl(var(--yk-off)); }
  .gs-opt.selected {
    border-color: hsl(var(--yk-red));
    background: hsl(var(--yk-red) / .05);
  }
  .gs-opt-tag {
    flex: none; width: 22px; height: 22px; border-radius: 999px;
    border: 2px solid hsl(var(--yk-ink) / .2);
    display: grid; place-items: center;
    transition: all .15s;
  }
  .gs-opt.selected .gs-opt-tag {
    border-color: hsl(var(--yk-red));
    background: hsl(var(--yk-red));
  }
  .gs-opt.selected .gs-opt-tag::after {
    content: ""; width: 8px; height: 8px; border-radius: 999px; background: white;
  }
  .gs-opt-label { font-weight: 600; font-size: 16px; letter-spacing: -0.005em; }
  .gs-opt-sub { font-size: 13px; color: hsl(var(--yk-ink) / .55); margin-top: 2px; }
  .gs-nav { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .gs-nav .gs-back {
    background: none; border: none; color: hsl(var(--yk-ink) / .6);
    font: inherit; font-weight: 600; font-size: 14px; cursor: pointer;
    padding: 10px 0; display: inline-flex; align-items: center; gap: 6px;
  }
  .gs-nav .gs-back:hover { color: hsl(var(--yk-ink)); }
  .gs-nav .gs-back:disabled { opacity: 0; pointer-events: none; }
  .gs-step-meta { font-size: 12px; color: hsl(var(--yk-ink) / .5); font-weight: 600; letter-spacing: 0.04em; }
  .gs-fit-banner {
    display: flex; gap: 14px; align-items: center;
    padding: 20px 24px;
    background: linear-gradient(135deg, hsl(var(--yk-red)) 0%, hsl(var(--yk-red-deep)) 100%);
    color: white; border-radius: 14px;
    margin-bottom: 28px;
  }
  .gs-fit-banner .check {
    flex: none; width: 40px; height: 40px; border-radius: 999px;
    background: white; color: hsl(var(--yk-red));
    display: grid; place-items: center; font-size: 22px; font-weight: 900;
  }
  .gs-fit-banner h3 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
  .gs-fit-banner p { margin: 2px 0 0; font-size: 13px; color: hsl(0 0% 100% / .85); line-height: 1.45; }
  .gs-reveal-tabs { display: flex; gap: 6px; border-bottom: 1px solid hsl(var(--yk-line)); margin-bottom: 20px; }
  .gs-reveal-tabs button {
    background: none; border: none; font: inherit; font-weight: 700; font-size: 14px;
    color: hsl(var(--yk-ink) / .5); cursor: pointer;
    padding: 10px 16px; position: relative; letter-spacing: -0.005em;
  }
  .gs-reveal-tabs button.active { color: hsl(var(--yk-ink)); }
  .gs-reveal-tabs button.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -1px;
    height: 2px; background: hsl(var(--yk-red));
  }
  .gs-calendly { border-radius: 14px; overflow: hidden; border: 1px solid hsl(var(--yk-line)); min-height: 620px; }
  .gs-foot-note { margin-top: 20px; font-size: 12px; color: hsl(var(--yk-ink) / .5); text-align: center; }

  .gs-confirm {
    text-align: center; padding: 16px 0;
  }
  .gs-confirm .big-check {
    width: 88px; height: 88px; border-radius: 999px;
    background: hsl(var(--yk-red));
    color: white;
    display: grid; place-items: center;
    margin: 0 auto 24px; font-size: 44px;
    box-shadow: 0 20px 40px -12px hsl(var(--yk-red) / .5);
  }
  .gs-confirm h2 {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 8px;
  }
  .gs-confirm p { font-size: 15px; color: hsl(var(--yk-ink) / .65); line-height: 1.6; margin: 0 0 8px; }
  .gs-confirm .next-steps {
    background: hsl(var(--yk-off)); border-radius: 14px;
    text-align: left; padding: 20px 24px; margin-top: 28px;
  }
  .gs-confirm .next-steps h4 {
    margin: 0 0 12px; font-size: 12px; font-weight: 800; letter-spacing: 0.14em;
    text-transform: uppercase; color: hsl(var(--yk-ink) / .5);
  }
  .gs-confirm .next-steps li { font-size: 14px; color: hsl(var(--yk-ink) / .75); margin-bottom: 6px; line-height: 1.5; }

  .gs-testimonial {
    max-width: 720px; margin: 24px auto 0;
    text-align: center; color: hsl(0 0% 100% / .75);
    font-size: 14px; padding: 0 24px;
  }
  .gs-testimonial strong { color: white; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 560px) {
    .gs-body { padding: 28px 24px 32px; }
    .gs-q { font-size: 24px; }
    .field-row { grid-template-columns: 1fr; }
    .gs-opt { padding: 14px 16px; }
  }
</style>
